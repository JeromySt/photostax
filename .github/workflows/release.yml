name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: photostax-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: photostax-windows-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: photostax-macos-aarch64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
      with:
        toolchain: stable
        targets: ${{ matrix.target }}

    - name: Build release
      run: cargo build --workspace --release --target ${{ matrix.target }}

    - name: Upload CLI artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact }}
        path: |
          target/${{ matrix.target }}/release/photostax-cli*
          !target/${{ matrix.target }}/release/*.d
        retention-days: 5

    - name: Upload FFI artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact }}-ffi
        path: |
          target/${{ matrix.target }}/release/*photostax_ffi*
          !target/${{ matrix.target }}/release/*.d
        retention-days: 5

  release:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Package platform archives
      run: |
        cd artifacts
        for dir in */; do
          name="${dir%/}"
          tar czf "../${name}.tar.gz" -C "$dir" .
        done
        cd ..
        ls -la *.tar.gz

    - name: Get version from tag
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: "*.tar.gz"
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-preview') || contains(github.ref, '-pre.') }}

  publish-crates:
    needs: release
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
    if: ${{ !contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-preview') && !contains(github.ref, '-pre.') }}

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
      with:
        toolchain: stable

    - name: Publish photostax-core to crates.io
      run: cargo publish -p photostax-core
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    - name: Wait for crates.io index to update
      run: sleep 30

    - name: Publish photostax-ffi to crates.io
      run: cargo publish -p photostax-ffi
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    - name: Wait for crates.io index to update
      run: sleep 30

    - name: Publish photostax-cli to crates.io
      run: cargo publish -p photostax-cli
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-nuget:
    needs: release
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      contents: read
    if: ${{ !contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-preview') && !contains(github.ref, '-pre.') }}

    steps:
    - uses: actions/checkout@v6

    - name: Download FFI artifacts
      uses: actions/download-artifact@v8
      with:
        path: native-libs
        pattern: '*-ffi'

    - name: Stage native libraries for NuGet packaging
      run: |
        mkdir -p staged-native
        # Windows x64
        cp native-libs/photostax-windows-x86_64-ffi/photostax_ffi.dll staged-native/ 2>/dev/null || true
        # Linux x64
        cp native-libs/photostax-linux-x86_64-ffi/libphotostax_ffi.so staged-native/ 2>/dev/null || true
        # macOS ARM64 (renamed to arm64 variant expected by the .csproj)
        cp native-libs/photostax-macos-aarch64-ffi/libphotostax_ffi.dylib staged-native/libphotostax_ffi_arm64.dylib 2>/dev/null || true
        echo "Staged native libraries:"
        ls -la staged-native/

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Get version from tag
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build .NET package
      run: dotnet pack bindings/dotnet/Photostax.sln --configuration Release -p:Version=${{ steps.version.outputs.version }} -p:RustTargetDir=${{ github.workspace }}/staged-native

    - name: Publish to NuGet
      run: dotnet nuget push "bindings/dotnet/**/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    if: ${{ !contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-preview') && !contains(github.ref, '-pre.') }}

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
      with:
        toolchain: stable

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
        cache-dependency-path: bindings/typescript/package-lock.json

    - name: Ensure latest npm (>= 11.5.1 for OIDC)
      run: npm install -g npm@latest

    - name: Get version from tag
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Install dependencies
      working-directory: bindings/typescript
      run: npm ci

    - name: Build native addon
      working-directory: bindings/typescript
      run: npm run build

    - name: Update package version
      working-directory: bindings/typescript
      run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

    - name: Publish to npm (OIDC Trusted Publishing)
      working-directory: bindings/typescript
      run: npm publish --provenance --access public
