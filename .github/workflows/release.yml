name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: photostax-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: photostax-windows-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: photostax-macos-aarch64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build release
      run: cargo build --workspace --release --target ${{ matrix.target }}

    - name: Upload build artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.artifact }}
        path: target/${{ matrix.target }}/release/photostax-cli*
        retention-days: 5

  release:
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Download all artifacts
      uses: actions/download-artifact@v7
      with:
        path: artifacts

    - name: Get version from tag
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/**/*
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-preview') || contains(github.ref, '-pre.') }}

  publish-crates:
    needs: release
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
    if: ${{ !contains(github.ref, '-beta') && !contains(github.ref, '-alpha') && !contains(github.ref, '-preview') && !contains(github.ref, '-pre.') }}

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Publish to crates.io
      run: |
        cargo publish -p photostax-core
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      continue-on-error: true
