name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
      with:
        toolchain: stable
        components: clippy, rustfmt

    - name: Cache cargo registry & build
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Clippy
      run: cargo clippy --workspace --all-targets -- -D warnings

    - name: Build
      run: cargo build --workspace

    - name: Test
      run: cargo test --workspace

  rust-coverage:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
      with:
        toolchain: stable
        components: llvm-tools-preview

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@f8322bb8433a470894cb027c3fe836505d0fa98b # cargo-llvm-cov
      with:
        tool: cargo-llvm-cov

    - name: Cache cargo registry & build
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-coverage-

    - name: Generate coverage report
      run: cargo llvm-cov --package photostax-core --lcov --output-path lcov.info

    - name: Verify coverage threshold (90%)
      run: |
        COVERAGE=$(cargo llvm-cov --package photostax-core --json | jq '.data[0].totals.lines.percent')
        echo "Line coverage: ${COVERAGE}%"
        if (( $(echo "$COVERAGE < 90" | bc -l) )); then
          echo "::error::Coverage ${COVERAGE}% is below 90% threshold"
          exit 1
        fi
        echo "✓ Coverage meets 90% threshold"

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: lcov.info
        retention-days: 30

  security:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
      with:
        toolchain: stable

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run cargo audit
      run: cargo audit
      continue-on-error: true

  dotnet:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [rust-check]

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
      with:
        toolchain: stable

    - name: Build native FFI library
      run: cargo build --package photostax-ffi --release

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore bindings/dotnet/Photostax.sln

    - name: Build .NET solution
      run: dotnet build bindings/dotnet/Photostax.sln --no-restore --configuration Release

    - name: Run .NET tests
      run: dotnet test bindings/dotnet/Photostax.sln --no-build --configuration Release --verbosity normal
      env:
        LD_LIBRARY_PATH: ${{ github.workspace }}/target/release

  typescript:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [rust-check]

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
      with:
        toolchain: stable

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: bindings/typescript/package-lock.json

    - name: Install dependencies
      working-directory: bindings/typescript
      run: npm ci

    - name: Build TypeScript binding
      working-directory: bindings/typescript
      run: npm run build

    - name: Run tests
      working-directory: bindings/typescript
      run: npm test

  docs:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
      with:
        toolchain: stable

    - name: Build documentation
      run: cargo doc --no-deps --workspace

    - name: Upload documentation artifact
      uses: actions/upload-artifact@v7
      with:
        name: rust-docs
        path: target/doc
        retention-days: 30

  # Auto-create pre-release on push to main
  prerelease:
    name: Create Pre-release
    needs: [rust-check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
      with:
        toolchain: stable

    - name: Build release binaries
      run: cargo build --workspace --release

    - name: Get version and generate tag
      id: version
      run: |
        VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "photostax-core") | .version')
        SHORT_SHA=$(git rev-parse --short HEAD)
        TIMESTAMP=$(date +%Y%m%d%H%M%S)
        TAG="v${VERSION}-pre.${TIMESTAMP}.${SHORT_SHA}"
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "Generated pre-release tag: ${TAG}"

    - name: Create pre-release tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ steps.version.outputs.tag }}
        git push origin ${{ steps.version.outputs.tag }}

    - name: Create GitHub Pre-release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Pre-release ${{ steps.version.outputs.tag }}
        prerelease: true
        generate_release_notes: true
